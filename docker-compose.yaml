##############################################################################
# Lago Billing — Coolify-ready Docker Compose
#
# Open Source Metering and Usage-Based Billing API
# https://github.com/getlago/lago
#
# ══════════════════════════════════════════════════════════════════════════
# REQUIRED — must be set before deployment
# ══════════════════════════════════════════════════════════════════════════
#   SECRET_KEY_BASE                      – Rails session key (generate: openssl rand -hex 64)
#   LAGO_RSA_PRIVATE_KEY                 – Webhook signature key (generate: openssl genrsa 2048 | base64)
#   LAGO_ENCRYPTION_PRIMARY_KEY          – Primary encryption key (32 chars alphanumeric)
#   LAGO_ENCRYPTION_DETERMINISTIC_KEY    – Deterministic encryption key (32 chars)
#   LAGO_ENCRYPTION_KEY_DERIVATION_SALT  – Key derivation salt (32 chars)
#
# ── Optional — sensible defaults provided ────────────────────────────────
#
#   URLs & Ports
#   LAGO_API_URL         – Public API URL              (default: http://localhost:3000)
#   LAGO_FRONT_URL       – Public frontend URL         (default: http://localhost)
#   API_PORT             – API host port               (default: 3000)
#   FRONT_PORT           – Frontend host port          (default: 80)
#
#   Database
#   POSTGRES_USER        – DB user                     (default: lago)
#   POSTGRES_PASSWORD    – DB password                 (default: changeme)
#   POSTGRES_DB          – DB name                     (default: lago)
#   POSTGRES_PORT        – DB port                     (default: 5432)
#   POSTGRES_HOST        – DB host                     (default: db)
#   POSTGRES_SCHEMA      – DB schema                   (default: public)
#
#   Redis
#   REDIS_HOST           – Redis host                  (default: redis)
#   REDIS_PORT           – Redis port                  (default: 6379)
#   REDIS_PASSWORD       – Redis password              (default: empty)
#
#   Email / SMTP
#   LAGO_FROM_EMAIL      – Sender email                (default: empty)
#   LAGO_SMTP_ADDRESS    – SMTP server                 (default: empty)
#   LAGO_SMTP_PORT       – SMTP port                   (default: 587)
#   LAGO_SMTP_USERNAME   – SMTP user                   (default: empty)
#   LAGO_SMTP_PASSWORD   – SMTP password               (default: empty)
#
#   AWS S3 Storage
#   LAGO_USE_AWS_S3              – Enable S3            (default: false)
#   LAGO_AWS_S3_ACCESS_KEY_ID    – S3 access key
#   LAGO_AWS_S3_SECRET_ACCESS_KEY – S3 secret key
#   LAGO_AWS_S3_REGION           – S3 region            (default: us-east-1)
#   LAGO_AWS_S3_BUCKET           – S3 bucket name
#   LAGO_AWS_S3_ENDPOINT         – S3-compatible endpoint URL
#
#   Google Cloud Storage
#   LAGO_USE_GCS         – Enable GCS                  (default: false)
#   LAGO_GCS_PROJECT     – GCS project
#   LAGO_GCS_BUCKET      – GCS bucket
#
#   Feature Flags
#   LAGO_DISABLE_SIGNUP          – Disable sign-ups     (default: false)
#   LAGO_DISABLE_PDF_GENERATION  – Disable PDF gen      (default: false)
#   LAGO_DISABLE_SEGMENT         – Disable analytics    (default: empty)
#   LAGO_SIDEKIQ_WEB             – Enable Sidekiq UI    (default: true)
#
#   Initial Setup (auto-create org on first boot)
#   LAGO_CREATE_ORG              – Auto-create org      (default: false)
#   LAGO_ORG_USER_EMAIL          – Admin email
#   LAGO_ORG_USER_PASSWORD       – Admin password
#   LAGO_ORG_NAME                – Organization name
#   LAGO_ORG_API_KEY             – API key for seeded org
#
#   OAuth
#   GOOGLE_AUTH_CLIENT_ID        – Google OAuth ID
#   GOOGLE_AUTH_CLIENT_SECRET    – Google OAuth secret
#
#   AI Features
#   MISTRAL_API_KEY      – Mistral AI API key
#   MISTRAL_AGENT_ID     – Mistral Agent ID
#
#   Licensing
#   LAGO_LICENSE         – Premium license key          (default: empty)
#
#   Monitoring
#   SENTRY_DSN           – Sentry DSN for backend
#   SENTRY_DSN_FRONT     – Sentry DSN for frontend
##############################################################################

volumes:
  lago_postgres_data:
  lago_redis_data:
  lago_storage_data:

x-postgres-image: &postgres-image
  image: getlago/postgres-partman:15.0-alpine
x-redis-image: &redis-image
  image: redis:7-alpine
x-backend-image: &backend-image
  image: getlago/api:v1.44.0
x-frontend-image: &frontend-image
  image: getlago/front:v1.44.0

x-lago-api-url: &lago-api-url
  "LAGO_API_URL": ${LAGO_API_URL:-http://localhost:3000}
x-lago-front-url: &lago-front-url
  "LAGO_FRONT_URL": ${LAGO_FRONT_URL:-http://localhost}

x-backend-environment: &backend-env
  "DATABASE_URL": postgresql://${POSTGRES_USER:-lago}:${POSTGRES_PASSWORD:-changeme}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-lago}?search_path=${POSTGRES_SCHEMA:-public}
  "REDIS_URL": redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}
  "REDIS_PASSWORD": ${REDIS_PASSWORD:-}
  "SECRET_KEY_BASE": ${SECRET_KEY_BASE:?Set SECRET_KEY_BASE}
  "RAILS_ENV": production
  "RAILS_LOG_TO_STDOUT": ${LAGO_RAILS_STDOUT:-true}
  "LAGO_RSA_PRIVATE_KEY": ${LAGO_RSA_PRIVATE_KEY:?Set LAGO_RSA_PRIVATE_KEY}
  "LAGO_SIDEKIQ_WEB": ${LAGO_SIDEKIQ_WEB:-true}
  "LAGO_ENCRYPTION_PRIMARY_KEY": ${LAGO_ENCRYPTION_PRIMARY_KEY:?Set LAGO_ENCRYPTION_PRIMARY_KEY}
  "LAGO_ENCRYPTION_DETERMINISTIC_KEY": ${LAGO_ENCRYPTION_DETERMINISTIC_KEY:?Set LAGO_ENCRYPTION_DETERMINISTIC_KEY}
  "LAGO_ENCRYPTION_KEY_DERIVATION_SALT": ${LAGO_ENCRYPTION_KEY_DERIVATION_SALT:?Set LAGO_ENCRYPTION_KEY_DERIVATION_SALT}
  "LAGO_USE_AWS_S3": ${LAGO_USE_AWS_S3:-false}
  "LAGO_AWS_S3_ACCESS_KEY_ID": ${LAGO_AWS_S3_ACCESS_KEY_ID:-}
  "LAGO_AWS_S3_SECRET_ACCESS_KEY": ${LAGO_AWS_S3_SECRET_ACCESS_KEY:-}
  "LAGO_AWS_S3_REGION": ${LAGO_AWS_S3_REGION:-us-east-1}
  "LAGO_AWS_S3_BUCKET": ${LAGO_AWS_S3_BUCKET:-}
  "LAGO_AWS_S3_ENDPOINT": ${LAGO_AWS_S3_ENDPOINT:-}
  "LAGO_USE_GCS": ${LAGO_USE_GCS:-false}
  "LAGO_GCS_PROJECT": ${LAGO_GCS_PROJECT:-}
  "LAGO_GCS_BUCKET": ${LAGO_GCS_BUCKET:-}
  "LAGO_FROM_EMAIL": ${LAGO_FROM_EMAIL:-}
  "LAGO_SMTP_ADDRESS": ${LAGO_SMTP_ADDRESS:-}
  "LAGO_SMTP_PORT": ${LAGO_SMTP_PORT:-587}
  "LAGO_SMTP_USERNAME": ${LAGO_SMTP_USERNAME:-}
  "LAGO_SMTP_PASSWORD": ${LAGO_SMTP_PASSWORD:-}
  "LAGO_PDF_URL": ${LAGO_PDF_URL:-http://pdf:3000}
  "LAGO_DATA_API_URL": ${LAGO_DATA_API_URL:-http://data-api}
  "LAGO_DATA_API_BEARER_TOKEN": ${LAGO_DATA_API_BEARER_TOKEN:-}
  "LAGO_REDIS_CACHE_URL": redis://${LAGO_REDIS_CACHE_HOST:-redis}:${LAGO_REDIS_CACHE_PORT:-6379}
  "LAGO_REDIS_CACHE_PASSWORD": ${LAGO_REDIS_CACHE_PASSWORD:-}
  "LAGO_REDIS_CABLE_URL": ${LAGO_REDIS_CABLE_URL:-}
  "LAGO_DISABLE_SEGMENT": ${LAGO_DISABLE_SEGMENT:-}
  "LAGO_DISABLE_WALLET_REFRESH": ${LAGO_DISABLE_WALLET_REFRESH:-}
  "LAGO_DISABLE_SIGNUP": ${LAGO_DISABLE_SIGNUP:-false}
  "LAGO_DISABLE_PDF_GENERATION": ${LAGO_DISABLE_PDF_GENERATION:-false}
  "LAGO_OAUTH_PROXY_URL": https://proxy.getlago.com
  "LAGO_LICENSE": ${LAGO_LICENSE:-}
  "LAGO_CREATE_ORG": ${LAGO_CREATE_ORG:-false}
  "LAGO_ORG_USER_PASSWORD": ${LAGO_ORG_USER_PASSWORD:-}
  "LAGO_ORG_USER_EMAIL": ${LAGO_ORG_USER_EMAIL:-}
  "LAGO_ORG_NAME": ${LAGO_ORG_NAME:-}
  "LAGO_ORG_API_KEY": ${LAGO_ORG_API_KEY:-}
  "GOOGLE_AUTH_CLIENT_ID": ${GOOGLE_AUTH_CLIENT_ID:-}
  "GOOGLE_AUTH_CLIENT_SECRET": ${GOOGLE_AUTH_CLIENT_SECRET:-}
  "MISTRAL_API_KEY": ${MISTRAL_API_KEY:-}
  "MISTRAL_AGENT_ID": ${MISTRAL_AGENT_ID:-}
  "SENTRY_DSN": ${SENTRY_DSN:-}

x-frontend-environment: &frontend-env
  "API_URL": ${LAGO_API_URL:-http://localhost:3000}
  "APP_ENV": production
  "LAGO_OAUTH_PROXY_URL": https://proxy.getlago.com
  "LAGO_DISABLE_PDF_GENERATION": ${LAGO_DISABLE_PDF_GENERATION:-false}
  "SENTRY_DSN": ${SENTRY_DSN_FRONT:-}

services:
  db:
    <<: *postgres-image
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-lago} -d ${POSTGRES_DB:-lago} -h localhost -p ${POSTGRES_PORT:-5432}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lago}
      POSTGRES_USER: ${POSTGRES_USER:-lago}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      PGDATA: /data/postgres
      PGPORT: ${POSTGRES_PORT:-5432}
      POSTGRES_SCHEMA: public
    volumes:
      - lago_postgres_data:/data/postgres
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  redis:
    <<: *redis-image
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "${REDIS_PORT:-6379}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --port ${REDIS_PORT:-6379}
    volumes:
      - lago_redis_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
        compress: "true"

  migrate:
    <<: *backend-image
    depends_on:
      db:
        condition: service_healthy
        restart: true
    command: ["./scripts/migrate.sh"]
    environment:
      <<: *backend-env

  api:
    <<: *backend-image
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
    command: ["./scripts/start.api.sh"]
    healthcheck:
      test: curl -f http://localhost:3000/health || exit 1
      interval: 10s
      start_period: 30s
      timeout: 60s
      start_interval: 2s
    environment:
      <<: [*backend-env, *lago-api-url, *lago-front-url]
    volumes:
      - lago_storage_data:/app/storage
    ports:
      - ${API_PORT:-3000}:3000
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  front:
    <<: *frontend-image
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
        restart: true
    environment:
      <<: [*frontend-env, *lago-api-url, *lago-front-url]
    ports:
      - ${FRONT_PORT:-80}:80
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
        compress: "true"

  api-worker:
    <<: *backend-image
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
    command: ["./scripts/start.worker.sh"]
    healthcheck:
      test: curl -f http://localhost:8080 || exit 1
      interval: 10s
      start_period: 30s
      timeout: 60s
      start_interval: 2s
    environment:
      <<: [*backend-env, *lago-api-url]
    volumes:
      - lago_storage_data:/app/storage
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  api-clock:
    <<: *backend-image
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
    command: ["./scripts/start.clock.sh"]
    environment:
      <<: [*backend-env, *lago-api-url]
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
        compress: "true"

  pdf:
    image: getlago/lago-gotenberg:7.8.2
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
        compress: "true"
