services:
  app:
    image: getlago/api:latest
    container_name: lago
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - DATABASE_URL=${{DATABASE_URL}}
      - REDIS_URL=${{REDIS_URL}}
      - SECRET_KEY_BASE=${{SECRET_KEY_BASE}}
      - LAGO_RSA_PRIVATE_KEY=${{LAGO_RSA_PRIVATE_KEY}}
      - LAGO_ENCRYPTION_PRIMARY_KEY=${{LAGO_ENCRYPTION_PRIMARY_KEY}}
      - LAGO_ENCRYPTION_DETERMINISTIC_KEY=${{LAGO_ENCRYPTION_DETERMINISTIC_KEY}}
      - LAGO_ENCRYPTION_KEY_DERIVATION_SALT=${{LAGO_ENCRYPTION_KEY_DERIVATION_SALT}}
      - LAGO_API_URL=${{LAGO_API_URL}}
      - LAGO_FRONT_URL=${{LAGO_FRONT_URL}}
      - LAGO_FROM_EMAIL=${{LAGO_FROM_EMAIL}}
    volumes:
      - app_data:/data
    networks:
      - internal

  front:
    image: getlago/front:latest
    restart: unless-stopped
    ports:
      - "3001:80"
    networks:
      - internal

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lago
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lago}
      POSTGRES_DB: lago
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal

volumes:
  postgres_data:
volumes:
  app_data:

networks:
  internal:
